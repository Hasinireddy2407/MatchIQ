<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Company Profile - MatchIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f8fafc;
  padding:40px 60px;
  color:#1e293b;
}

h1{
  font-size:28px;
  margin-bottom:6px;
}

.subtitle{
  color:#64748b;
  margin-bottom:30px;
}

/* FORM LAYOUT */
.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  margin-bottom:25px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:14px;
  margin-bottom:6px;
  font-weight:500;
}

.form-group input,
.form-group textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  font-size:14px;
  outline:none;
  background:white;
}

.form-group input:focus,
.form-group textarea:focus{
  border-color:#2dd4bf;
}

textarea{
  resize:none;
  height:120px;
}

.full-width{
  grid-column:span 2;
}

.save-btn{
  margin-top:20px;
  padding:10px 20px;
  background:#2dd4bf;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.save-btn:hover{
  background:#26b6a8;
}

/* RESPONSIVE */
@media(max-width:900px){
  body{
    padding:30px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .full-width{
    grid-column:span 1;
  }
}
</style>
</head>

<body>

<h1>Company Profile</h1>
<div class="subtitle">
  Showcase your company to attract top talent
</div>

<div class="form-grid">

  <div class="form-group">
    <label>Company Name</label>
    <input type="text" value="TechVision Inc.">
  </div>

  <div class="form-group">
    <label>Industry</label>
    <input type="text" value="Technology">
  </div>

  <div class="form-group">
    <label>Website</label>
    <input type="text" value="https://techvision.com">
  </div>

  <div class="form-group">
    <label>Location</label>
    <input type="text" value="San Francisco, CA">
  </div>

  <div class="form-group">
    <label>Company Size</label>
    <input type="text" value="50-200">
  </div>

  <div class="form-group">
    <label>Founded</label>
    <input type="text" value="2018">
  </div>

  <div class="form-group full-width">
    <label>About</label>
    <textarea>TechVision Inc. is a leading technology company focused on building innovative solutions for the modern workplace.</textarea>
  </div>

</div>

<button class="save-btn">Save Changes</button>

</body>
</html>
