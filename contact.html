<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - MatchIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f8fafc;
  color:#1e293b;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:18px;
}

.logo-icon{
  width:35px;
  height:35px;
  background:#2dd4bf;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav-links{
  display:flex;
  gap:25px;
  align-items:center;
}

.nav-links a{
  text-decoration:none;
  color:#475569;
  font-size:14px;
}

.get-started{
  background:#2dd4bf;
  padding:8px 16px;
  border-radius:8px;
  color:white !important;
}

/* HEADER */
.header{
  text-align:center;
  padding:60px 20px 30px;
}

.header h1{
  font-size:32px;
  margin-bottom:10px;
}

.header p{
  color:#64748b;
  font-size:15px;
}

/* CONTACT CARDS */
.contact-cards{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:25px 35px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  text-align:center;
  min-width:220px;
}

.card-icon{
  font-size:22px;
  margin-bottom:10px;
  color:#2dd4bf;
}

.card h4{
  font-size:15px;
  margin-bottom:5px;
}

.card p{
  font-size:14px;
  color:#64748b;
}

/* MESSAGE FORM */
.form-section{
  display:flex;
  justify-content:center;
  padding:40px 20px 80px;
}

.form-box{
  background:white;
  width:600px;
  padding:35px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.form-box h3{
  margin-bottom:20px;
}

.form-row{
  display:flex;
  gap:15px;
  margin-bottom:15px;
}

.form-group{
  flex:1;
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:13px;
  margin-bottom:5px;
}

.form-group input,
.form-group textarea{
  padding:10px;
  border-radius:8px;
  border:1px solid #e2e8f0;
  font-size:14px;
  outline:none;
}

.form-group input:focus,
.form-group textarea:focus{
  border-color:#2dd4bf;
}

textarea{
  resize:none;
  height:100px;
}

.submit-btn{
  margin-top:10px;
  background:#2dd4bf;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.submit-btn:hover{
  opacity:0.9;
}

/* RESPONSIVE */
@media(max-width:768px){
  .form-row{
    flex-direction:column;
  }

  .navbar{
    padding:20px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <div class="logo-icon">🎁</div>
    MatchIQ
  </div>

  <div class="nav-links">
    <a href="#">Find Jobs</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Log in</a>
    <a href="#" class="get-started">Get Started</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Contact Us</h1>
  <p>Have questions? We'd love to hear from you.</p>
</div>

<!-- CONTACT CARDS -->
<div class="contact-cards">

  <div class="card">
    <div class="card-icon">📧</div>
    <h4>Email</h4>
    <p>hello@matchiq.ai</p>
  </div>

  <div class="card">
    <div class="card-icon">📞</div>
    <h4>Phone</h4>
    <p>+1 (555) 123-4567</p>
  </div>

  <div class="card">
    <div class="card-icon">📍</div>
    <h4>Office</h4>
    <p>San Francisco, CA</p>
  </div>

</div>

<!-- FORM -->
<div class="form-section">
  <div class="form-box">
    <h3>Send a Message</h3>

    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your name">
        <div class="form-group">
  <label>Message</label>
  <textarea placeholder="Tell us more..."></textarea>
  
</div>

<button class="submit-btn">Send Message</button>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>
    </div>

    <div class="form-group">
      <label>Subject</label>
      <input type="text" placeholder="How can we help?">
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Write your message..."></textarea>
    </div>

    <button class="submit-btn">Send Message</button>
  </div>
</div>

</body>
</html>
