<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MatchIQ Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
    }

    /* ===== LEFT SIDE ===== */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #1f2a44, #1f4e5f);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      font-weight: 700;
      font-size: 20px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: #2dd4bf;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .left p {
      font-size: 18px;
      color: #cbd5e1;
      max-width: 420px;
    }

    /* ===== RIGHT SIDE ===== */
    .right {
      flex: 1;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .signup-box {
      background: white;
      width: 420px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .signup-box h2 {
      font-size: 26px;
      margin-bottom: 5px;
    }

    .signup-box p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 25px;
    }

    /* ROLE SELECT */
    .roles {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .role-card {
      flex: 1;
      padding: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    .role-card.active {
      border-color: #2dd4bf;
      background: #ecfdf5;
    }

    .role-card:hover {
      border-color: #2dd4bf;
    }

    .role-card strong {
      display: block;
      margin-top: 5px;
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #2dd4bf;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2dd4bf;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .signin-link {
      text-align: center;
      font-size: 14px;
      margin-top: 18px;
      color: #64748b;
    }

    .signin-link a {
      color: #2dd4bf;
      text-decoration: none;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .left {
        padding: 50px 30px;
        text-align: center;
      }

      .left h1 {
        font-size: 36px;
      }

      .right {
        padding: 30px;
      }
    }

  </style>
</head>
<body>

  <!-- LEFT -->
  <div class="left">
    <div class="brand">
      <div class="brand-icon">🎁</div>
      MatchIQ
    </div>

    <h1>Join MatchIQ</h1>
    <p>Create your account and start finding your perfect career match today.</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="signup-box">
      <h2>Create your account</h2>
      <p>Choose your role to get started</p>

      <!-- ROLE SELECTION -->
      <div class="roles">
        <div class="role-card">
          👤
          <strong>Job Seeker</strong>
          Find your dream job
        </div>

        <div class="role-card active">
          🏢
          <strong>Employer</strong>
          Hire top talent
        </div>
      </div>

      <!-- FORM -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Min 6 characters">
      </div>

      <button class="btn">Sign Up as Employer</button>

      <div class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

</body>
</html>
