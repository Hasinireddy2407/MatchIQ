<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - MatchIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  display:flex;
  background:#f8fafc;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,#0f172a,#1e293b);
  color:white;
  padding:25px 15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  margin-bottom:30px;
}

.brand-icon{
  width:35px;
  height:35px;
  background:#2dd4bf;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu a{
  text-decoration:none;
  color:#cbd5e1;
  padding:10px 12px;
  border-radius:8px;
  font-size:14px;
  transition:0.3s;
}

.menu a:hover{
  background:#334155;
}

.menu a.active{
  background:#2dd4bf;
  color:white;
}

.logout{
  font-size:14px;
  color:#cbd5e1;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:40px 60px;
}

.main h1{
  font-size:26px;
  margin-bottom:5px;
}

.subtitle{
  color:#64748b;
  margin-bottom:30px;
}

/* FORM */
.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  margin-bottom:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:13px;
  margin-bottom:5px;
}

.form-group input{
  padding:10px;
  border-radius:8px;
  border:1px solid #e2e8f0;
  font-size:14px;
}

.form-group input:focus{
  border-color:#2dd4bf;
  outline:none;
}

/* SKILLS */
.skills-section{
  margin-top:20px;
}

.skills-input{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.skills-input input{
  flex:1;
}

.add-btn{
  padding:8px 15px;
  border:none;
  background:#e2e8f0;
  border-radius:8px;
  cursor:pointer;
}

.skill-tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.skill-tags span{
  background:#e2e8f0;
  padding:5px 10px;
  border-radius:15px;
  font-size:12px;
}

/* RESUME UPLOAD */
.upload-box{
  margin-top:25px;
  border:2px dashed #cbd5e1;
  padding:40px;
  border-radius:12px;
  text-align:center;
  color:#64748b;
  font-size:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{
    display:none;
  }

  .main{
    padding:30px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="brand">
      <div class="brand-icon">🎁</div>
      MatchIQ
    </div>

    <div class="menu">
      <a href="#">Dashboard</a>
      <a href="#">Find Jobs</a>
      <a href="#">Applications</a>
      <a href="#">Saved Jobs</a>
      <a href="#" class="active">Profile</a>
    </div>
  </div>

  <div class="logout">Logout</div>

</div>

<!-- MAIN CONTENT -->
<div class="main">
  <h1>Your Profile</h1>
  <div class="subtitle">Keep your profile updated to get better matches</div>

  <div class="form-grid">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" value="Hasini">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" value="hasiniakkireddy@gmail.com">
    </div>

    <div class="form-group">
      <label>Preferred Role</label>
      <input type="text" value="Frontend Developer">
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" value="San Francisco, CA">
    </div>

    <div class="form-group">
      <label>Experience Level</label>
      <input type="text" value="5 years">
    </div>

    <div class="form-group">
      <label>Education</label>
      <input type="text" value="BS Computer Science">
    </div>
  </div>

  <!-- SKILLS -->
  <div class="skills-section">
    <label>Skills</label>

    <div class="skills-input">
      <input type="text" placeholder="Add a skill">
      <button class="add-btn">Add</button>
    </div>

    <div class="skill-tags">
      <span>React ×</span>
      <span>TypeScript ×</span>
      <span>Node.js ×</span>
      <span>GraphQL ×</span>
    </div>
  </div>

  <!-- RESUME UPLOAD -->
  <div class="upload-box">
    Drag & drop your resume here, or click to browse<br>
    PDF, DOC up to 5MB
  </div>

</div>

</body>
</html>
